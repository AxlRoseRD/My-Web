name: Alerta de Push

on:
  push:
    branches:
      - main

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar notificación a ntfy
        run: |
          curl -H "Title: Nuevo Push a Main" \
               -H "Tags: github" \
               -d "Repositorio: ${{ github.repository }}
          Autor: ${{ github.actor }}
          Commit: ${{ github.event.head_commit.message }}" \
               https://ntfy.sh/devops-itla
